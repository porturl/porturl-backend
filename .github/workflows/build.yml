name: Build

on:
  pull_request:
    branches: ['**']
  push:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pull-requests: write

jobs:
  test:
    name: 🧪 Test and Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Run tests with coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload test results and coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: test-results
          path: |
            build/reports/tests/
            build/test-results/
            build/reports/jacoco/
          retention-days: 7

      - name: Add coverage to PR
        id: jacoco
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
        with:
          paths: |
            ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          # 🎯 GITHUB PR THRESHOLDS - Adjust these percentages
          min-coverage-overall: 40        # Overall project minimum (40%)
          min-coverage-changed-files: 60  # New/changed files minimum (60%)
          title: 'Code Coverage Report'
          update-comment: true
          debug-mode: false

      - name: SonarCloud Scan
        if: env.SONAR_TOKEN != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar

  dependabot:
    name: 🤖 Dependabot Auto-Merge
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Enable auto-merge for Dependabot PRs (Patch and Minor)
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: 🏗️ Build Release Artifact
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    outputs:
      jar-name: ${{ steps.build_info.outputs.JAR_NAME }}
      native-name: ${{ steps.build_info.outputs.NATIVE_NAME }}
      version: ${{ steps.build_info.outputs.version }}
      timestamp: ${{ steps.build_info.outputs.timestamp }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@0def53c0fd8534bc13416c9469f5be45265824fd # v1.6.3
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      # This step installs the C compiler toolchain, which is required
      # by GraalVM to build a fully static native executable.
      - name: Install toolchain for static linking and dependencies
        run: sudo apt-get update && sudo apt-get install -y zlib1g-dev

      - name: Build release artifacts (JAR and Native) and get info
        run: |
          ./gradlew clean bootJar nativeCompile writeArtifactInfo -x test

      - name: Prepare build information
        id: build_info
        run: |
          # Load variables from file into the shell environment
          source build/artifact-info.properties

          cat build/artifact-info.properties >> $GITHUB_OUTPUT

          version=$(./gradlew properties -q | grep "version:" | awk '{print $2}')
          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "timestamp=$timestamp" >> $GITHUB_OUTPUT

          echo "Built JAR: $JAR_NAME"
          echo "Built Native: $NATIVE_NAME"
          echo "Version: $version"

      - name: Upload JAR artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jar-artifact
          path: build/libs/${{ steps.build_info.outputs.JAR_NAME }}
          retention-days: 7

      - name: Upload Native executable
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: native-executable
          path: build/native/nativeCompile/${{ steps.build_info.outputs.NATIVE_NAME }}
          retention-days: 7

  docker:
    name: 🐳 Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download Native executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: native-executable
          path: build/native/nativeCompile/

      - name: Download JAR artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: jar-artifact
          path: build/libs/

      - name: Make executable runnable
        run: chmod +x build/native/nativeCompile/*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare Docker tags for snapshot
        id: docker_tags
        run: |
          VERSION="${{ needs.build.outputs.version }}"

          # Snapshot tags for development builds (Native)
          TAGS_NATIVE="friesoft/porturl-backend:snapshot-native"

          # Snapshot tags for development builds (JVM)
          TAGS_JVM="friesoft/porturl-backend:snapshot"
          TAGS_JVM="$TAGS_JVM,friesoft/porturl-backend:snapshot-jvm"

          echo "tags_native=$TAGS_NATIVE" >> $GITHUB_OUTPUT
          echo "tags_jvm=$TAGS_JVM" >> $GITHUB_OUTPUT
          echo "Docker tags (Native): $TAGS_NATIVE"
          echo "Docker tags (JVM): $TAGS_JVM"

      - name: Build and push Native Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile.native
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags_native }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=porturl-backend-native
            org.opencontainers.image.description=PortURL Backend Native Application (Development Build)
            org.opencontainers.image.version=${{ needs.build.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.build.outputs.timestamp }}

      - name: Build and push JVM Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags_jvm }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=porturl-backend-jvm
            org.opencontainers.image.description=PortURL Backend JVM Application (Development Build)
            org.opencontainers.image.version=${{ needs.build.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ needs.build.outputs.timestamp }}

  release-snapshot:
    name: 🚀 Create Snapshot Release
    runs-on: ubuntu-latest
    needs: [test, build, docker]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download JAR artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: jar-artifact
          path: build/libs/

      - name: Download Native executable
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: native-executable
          path: build/native/nativeCompile/

      - name: Remove old snapshot prerelease
        run: |
          if gh release view snapshot --repo ${{ github.repository }} >/dev/null 2>&1; then
            gh release delete snapshot --cleanup-tag --yes --repo ${{ github.repository }}
            echo "Deleted existing snapshot release"
          else
            echo "No existing snapshot release found"
          fi
        env:
          GH_TOKEN: "${{ github.token }}"

      - name: Create snapshot prerelease
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd # v1
        with:
          token: "${{ github.token }}"
          tag: "snapshot"
          prerelease: true
          name: "Development Build (Snapshot)"
          generateReleaseNotes: true
          body: |
            ## 🚧 Development Build from main branch
            
            **Commit:** ${{ github.sha }}
            **Version:** ${{ needs.build.outputs.version }}
            **Built:** ${{ needs.build.outputs.timestamp }}
            
            ### 📦 Available Downloads
            - **JAR (JVM)**: `${{ needs.build.outputs.jar-name }}`
            - **Native Executable**: `${{ needs.build.outputs.native-name }}`

            ### 🐳 Docker Images
            ```bash
            # JVM image (Default)
            docker pull friesoft/porturl-backend:snapshot

            # Native image
            docker pull friesoft/porturl-backend:snapshot-native
            ```

            ### 🔧 Performance Benefits (Native)
            - ⚡ **Faster startup**: ~50ms vs ~2-5s
            - 💾 **Lower memory**: 20-50% reduction
            - 📦 **Smaller image**: ~50MB vs ~300MB
  
            ⚠️ **Not intended for production use** - This is an automated development build.
          artifacts: |
            build/libs/${{ needs.build.outputs.jar-name }}
            build/native/nativeCompile/${{ needs.build.outputs.native-name }}
          artifactContentType: "application/octet-stream"
          makeLatest: false
          allowUpdates: true

      - name: Upload build reports (on failure)
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: build-reports-snapshot-${{ github.sha }}
          path: |
            build/reports/
            build/test-results/
          retention-days: 7
