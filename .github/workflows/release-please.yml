on:
  push:
    branches:
      - main
      - production

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.ref_name }}

      - name: Enable Auto-Merge for Release PR (Production Branch)
        if: ${{ !steps.release.outputs.release_created && github.ref_name == 'production' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --state open --repo ${{ github.repository }} --base production --search "head:release-please" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr merge "$PR_NUMBER" --auto --squash --repo ${{ github.repository }}
            echo "Enabled auto-merge for Release PR #$PR_NUMBER on production"
          fi

      - name: Create Tag and Trigger Publish
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: |
          # Manually create the tag so release-please sees it for the next run
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git tag $TAG_NAME ${{ github.sha }}
          git push origin $TAG_NAME

          # Trigger publish workflow
          gh workflow run publish-release.yml --repo ${{ github.repository }} -f tag=$TAG_NAME -f sha=${{ github.sha }}

          # Update the rolling 'production' branch if we just released from main
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "Updating rolling production branch to $TAG_NAME"
            git push origin $TAG_NAME:production --force
          fi

          # Cleanup: Close any "Giant PRs" that release-please might have created because it ignored the Draft Release.
          gh pr list --repo ${{ github.repository }} --label "autorelease: pending" --state open --json number --jq '.[].number' | xargs -r -I {} gh pr close {} --repo ${{ github.repository }} --delete-branch
