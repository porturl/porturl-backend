on:
  push:
    branches:
      - main
      - production

permissions:
  contents: write
  issues: write
  pull-requests: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: ${{ github.ref_name }}

      - name: Enable Auto-Merge for Release PR (Production Branch)
        if: ${{ !steps.release.outputs.release_created && github.ref_name == 'production' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          PR_NUMBER=$(gh pr list --state open --repo ${{ github.repository }} --base production --search "head:release-please" --json number --jq '.[0].number')
          if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
            gh pr merge "$PR_NUMBER" --auto --squash --repo ${{ github.repository }}
            echo "Enabled auto-merge for Release PR #$PR_NUMBER on production"
          fi

      - name: Create Tag and Trigger Publish
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          
          # Manually create the tag
          git tag $TAG_NAME ${{ github.sha }}
          git push origin $TAG_NAME

          # Trigger publish workflow
          gh workflow run publish-release.yml --repo ${{ github.repository }} -f tag=$TAG_NAME -f sha=${{ github.sha }}

          # Update rolling 'production' branch if we released from main
          # We also bootstrap the manifest to start patch versioning (e.g. 0.11.0-patch.0)
          if [ "${{ github.ref_name }}" = "main" ]; then
             echo "Bootstrapping production branch for version $VERSION"
             git checkout -b production-bootstrap
             echo "{\".\": \"$VERSION-patch.0\"}" > .release-please-manifest.json
             git add .release-please-manifest.json
             git commit -m "chore(production): bootstrap patch versioning for $VERSION"
             git push origin HEAD:production --force
             
             # Create and push the initial patch tag so release-please can find it
             git tag "v$VERSION-patch.0"
             git push origin "v$VERSION-patch.0"
          fi

          # Cleanup: Close any "Giant PRs" that release-please might have created
          gh pr list --repo ${{ github.repository }} --label "autorelease: pending" --state open --json number --jq '.[].number' | xargs -r -I {} gh pr close {} --repo ${{ github.repository }} --delete-branch
